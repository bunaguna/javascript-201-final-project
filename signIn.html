<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <style>
        /* Basic page styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container to hold everything */
        .signup-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }

        /* Target labels and inputs inside the form */
        #signin_form label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        #signin_form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #signin_form input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
        }

        /* Styling for the Remember Me section */
        .remember-me-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Prevent the checkbox from taking 100% width */
        #signin_form .remember-me-container input[type="checkbox"] {
            width: auto;
            margin-bottom: 0;
            cursor: pointer;
        }

        #signin_form .remember-me-container label {
            margin-bottom: 0;
            font-weight: normal;
            cursor: pointer;
        }

        /* Styling the button */
        #signin_form button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        #signin_form button:hover {
            background-color: #0056b3;
        }

        #signin_form br {
            display: none;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>Log In to your Account</h2>
        <p style="text-align: center; color: #666; font-size: 14px;">Login In to our community today!</p>
        
        <form action="#" method="post" id="signin_form">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter Email" required>
            
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter Password" required>

            <div class="remember-me-container">
                <input type="checkbox" name="remember" id="remember">
                <label for="remember">Remember me</label>
            </div>
            
            <button type="submit">Sign In</button>
        </form>
    </div>

    <script src="./scripts/signIn.js"></script>
</body>
</html>
